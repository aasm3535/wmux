<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; background: #0c0c0f; overflow: hidden; }
  #terminal { width: calc(100% - 24px); height: calc(100% - 16px);
              margin: 8px 12px; }

  /* Dark scrollbar for xterm scrollback */
  .xterm-viewport::-webkit-scrollbar { width: 5px; }
  .xterm-viewport::-webkit-scrollbar-track { background: transparent; }
  .xterm-viewport::-webkit-scrollbar-thumb {
    background: #2a2a3a;
    border-radius: 3px;
  }
  .xterm-viewport::-webkit-scrollbar-thumb:hover {
    background: #3a3a50;
  }
</style>
<link rel="stylesheet" href="xterm.css" />
<script src="xterm.js"></script>
<script src="xterm-addon-fit.js"></script>
<script src="xterm-addon-web-links.js"></script>
</head>
<body>
<div id="terminal"></div>
<script>
const term = new Terminal({
  fontFamily: '"Cascadia Code", "Fira Code", "JetBrains Mono", Consolas, monospace',
  fontSize: 13,
  lineHeight: 1.25,
  letterSpacing: 0,
  cursorBlink: true,
  cursorStyle: 'bar',
  cursorWidth: 2,
  scrollback: 5000,
  theme: {
    background:   '#0c0c0f',
    foreground:   '#d4d4d8',
    cursor:       '#6366f1',
    cursorAccent: '#0c0c0f',
    selectionBackground: '#6366f133',
    black:        '#18181b',
    brightBlack:  '#3f3f46',
    red:          '#f87171',
    brightRed:    '#fca5a5',
    green:        '#4ade80',
    brightGreen:  '#86efac',
    yellow:       '#fbbf24',
    brightYellow: '#fde68a',
    blue:         '#60a5fa',
    brightBlue:   '#93c5fd',
    magenta:      '#c084fc',
    brightMagenta:'#d8b4fe',
    cyan:         '#22d3ee',
    brightCyan:   '#67e8f9',
    white:        '#d4d4d8',
    brightWhite:  '#f4f4f5',
  },
  allowProposedApi: true,
});

const fitAddon   = new FitAddon.FitAddon();
const linksAddon = new WebLinksAddon.WebLinksAddon();

term.loadAddon(fitAddon);
term.loadAddon(linksAddon);

// WebGL addon can be added later for GPU acceleration

term.open(document.getElementById('terminal'));
fitAddon.fit();

// ── I/O bridge with C# / ConPTY ──────────────────────────────────────────
term.onData(data => {
  window.chrome.webview.postMessage(JSON.stringify({ type: 'input', data }));
});

term.onResize(({ cols, rows }) => {
  window.chrome.webview.postMessage(JSON.stringify({ type: 'resize', cols, rows }));
});

window.chrome.webview.addEventListener('message', e => {
  let msg;
  try { msg = typeof e.data === 'string' ? JSON.parse(e.data) : e.data; }
  catch { return; }

  switch (msg.type) {
    case 'output':    term.write(msg.data); break;
    case 'setTheme':  term.options.theme = msg.theme; break;
    case 'setFont':
      term.options.fontFamily = msg.fontFamily;
      term.options.fontSize   = msg.fontSize;
      fitAddon.fit();
      break;
    case 'clear':     term.clear(); break;
    case 'focus':     term.focus(); break;
  }
});

// Auto-resize
new ResizeObserver(() => {
  try { fitAddon.fit(); } catch (_) {}
}).observe(document.getElementById('terminal'));

// Signal ready to C#
window.chrome.webview.postMessage(JSON.stringify({ type: 'ready' }));
term.focus();
</script>
</body>
</html>
